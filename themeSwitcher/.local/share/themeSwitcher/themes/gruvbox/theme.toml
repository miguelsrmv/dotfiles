mantle   = "#1d2021"
surface  = "#3c3836"
overlay  = "#504945"
muted    = "#282828"
text     = "#ebdbb2"
subtext  = "#a89984"
red      = "#cc241d"
orange   = "#d65d0e"
yellow   = "#d79921"
green    = "#98971a"
teal     = "#458588"
sky      = "#83a598"
sapphire = "#83a598"
blue     = "#458588"
mauve    = "#b16286"

[colors]
