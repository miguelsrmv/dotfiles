display_name = "Gruvbox"

[vars]
ghostty = "Gruvbox Dark"

[gnome]
color_scheme = "prefer-dark"
gtk_theme = "Gruvbox-Dark-BL"
shell_theme = "Gruvbox-Dark-BL"
icon_theme = "Papirus-Dark"
accent_color = "yellow"

[palette]
