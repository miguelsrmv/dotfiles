# [metadata]
# name = "miguel's config"
# author = "miguel"
# origin_url = "https://github.com/EdenEast/nightfox.nvim"

"$schema" = "https://starship.rs/config-schema.json"

format = """
$directory \
$git_branch$git_status\
$nodejs$python\
$docker_context$kubernetes\
$cmd_duration\
$character
"""

right_format = "$time"

palette = "everforest"

[palettes.everforest]
error_status = "#f85552"
success_status = "#a7c080"
replace_mode = "#3d484d"
visual_mode = "#7fbbb3"
bg = "#2d353b"
dir_fg = "#e67e80"
git_fg = "#d3c6aa"
time_fg = "#dbbc7f"

[directory]
style = "fg:dir_fg bg:bg"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = "ÔÇĞ/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "
"Projects" = "¯ÖØ "

[git_branch]
symbol = "´Éİ"
style = "bg:bg"
format = 'at [[$symbol $branch](fg:git_fg bg:bg)]($style)'

[git_status]
style = "bg:bg"
format = '[[( $all_status$ahead_behind)](fg:git_fg bg:bg)]($style) '

[character]
disabled = false
success_symbol = '[>](bold fg:success_status)'
error_symbol = '[>](bold fg:error_status)'
vimcmd_symbol = '[<](bold fg:success_status)'
vimcmd_replace_one_symbol = '[<](bold fg:replace_mode)'
vimcmd_replace_symbol = '[<](bold fg:replace_mode)'
vimcmd_visual_symbol = '[<](bold fg:visual_mode)'

[fill]
symbol = ""

[time]
disabled = false
style = "fg:time_fg bg:bg"
format = "[$time]($style)"
time_format = "%H:%M"

[python]
symbol = "¯İå "
format = "[$symbol($virtualenv )]($style)"
style = "fg:success_status"

[nodejs]
symbol = "¯£İ "
format = "[$symbol($version )]($style)"
style = "fg:success_status"

[docker_context]
symbol = "´îê "
format = "[$symbol$context ]($style)"
style = "fg:git_fg"
