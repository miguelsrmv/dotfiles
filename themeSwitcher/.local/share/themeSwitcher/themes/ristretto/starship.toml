# [metadata]
# name = "miguel's config"
# author = "miguel"
# origin_url = "https://github.com/EdenEast/nightfox.nvim"

"$schema" = "https://starship.rs/config-schema.json"

format = """
$directory \
$git_branch$git_status\
$nodejs$python\
$docker_context$kubernetes\
$cmd_duration\
$character
"""

right_format = "$time"

palette = "ristretto"

[palettes.ristretto]
error_status = "#fd6883"
success_status = "#adda78"
replace_mode = "#f9cc6c"
visual_mode = "#a8a9eb"
bg = "#2c2421"
dir_fg = "#f38d70"
git_fg = "#72696a"
time_fg = "#e6d9db"

[directory]
style = "fg:dir_fg bg:bg"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "’Ćü "
"Pictures" = "’ĆŠ "
"Projects" = "ŅÖØ "

[git_branch]
symbol = "’Éś"
style = "bg:bg"
format = 'at [[$symbol $branch](fg:git_fg bg:bg)]($style)'

[git_status]
style = "bg:bg"
format = '[[( $all_status$ahead_behind)](fg:git_fg bg:bg)]($style) '

[character]
disabled = false
success_symbol = '[>](bold fg:success_status)'
error_symbol = '[>](bold fg:error_status)'
vimcmd_symbol = '[<](bold fg:success_status)'
vimcmd_replace_one_symbol = '[<](bold fg:replace_mode)'
vimcmd_replace_symbol = '[<](bold fg:replace_mode)'
vimcmd_visual_symbol = '[<](bold fg:visual_mode)'

[fill]
symbol = ""

[time]
disabled = false
style = "fg:time_fg bg:bg"
format = "[$time]($style)"
time_format = "%H:%M"

[python]
symbol = "Ņśå "
format = "[$symbol($virtualenv )]($style)"
style = "fg:success_status"

[nodejs]
symbol = "Ņ£ś "
format = "[$symbol($version )]($style)"
style = "fg:success_status"

[docker_context]
symbol = "’īł "
format = "[$symbol$context ]($style)"
style = "fg:git_fg"
