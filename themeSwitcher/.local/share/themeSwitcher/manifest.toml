mem_box         = "green"
net_box         = "red"
proc_box        = "blue"
div_line        = "overlay"
temp_start      = "green"
temp_mid        = "yellow"
temp_end        = "red"
cpu_start       = "teal"
cpu_mid         = "sapphire"
cpu_end         = "red"
free_start      = "green"
free_mid        = "subtext"
free_end        = "blue"
cached_start    = "sapphire"
cached_mid      = "blue"
cached_end      = "red"
available_start = "green"
available_mid   = "red"
available_end   = "red"
used_start      = "teal"
