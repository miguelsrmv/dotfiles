# ── App selector ─────────────────────────────────────────────────────────────
# Set any app to false to skip it when switching themes.
# Omit this section entirely to enable all apps.

[apps]
ghostty  = true
tmux     = true
starship = true
btop     = true
nvim     = true
gnome    = true


# ── Catppuccin Macchiato ─────────────────────────────────────────────────────

[catppuccin-macchiato]
display_name = "Catppuccin"
ghostty      = "Catppuccin Macchiato"

[catppuccin-macchiato.gnome]
gtk_theme    = "Catppuccin-Mocha-Standard-Mauve-Dark"
shell_theme  = "Catppuccin-Mocha-Standard-Mauve-Dark"
icon_theme   = "Papirus-Dark"
accent_color = "purple"

[catppuccin-macchiato.palette]
base     = "#24273a"   # background
mantle   = "#1e2030"   # darker background
surface  = "#51576d"   # selection / UI surface
overlay  = "#737994"   # muted UI / dividers
muted    = "#838ba7"   # inactive text
text     = "#c6d0f5"   # foreground
subtext  = "#b8c0e0"   # secondary text
red      = "#e78284"   # error / danger
orange   = "#ef9f76"   # warning / peach
yellow   = "#e5c890"   # time / accent warm
green    = "#a6d189"   # success
teal     = "#81c8be"   # replace / cool accent
sky      = "#99d1db"   # light blue
sapphire = "#85c1dc"   # mid blue
blue     = "#8caaee"   # primary accent
mauve    = "#ca9ee6"   # secondary accent / cpu

[catppuccin-macchiato.colors]
background      = "base"
foreground      = "text"
highlight       = "teal"
secondary       = "subtext"
title           = "text"
hi_fg           = "blue"
selected_bg     = "surface"
selected_fg     = "blue"
inactive_fg     = "muted"
graph_text      = "subtext"
meter_bg        = "surface"
proc_misc       = "subtext"
cpu_box         = "mauve"
mem_box         = "green"
net_box         = "red"
proc_box        = "blue"
div_line        = "overlay"
temp_start      = "green"
temp_mid        = "yellow"
temp_end        = "red"
cpu_start       = "teal"
cpu_mid         = "sapphire"
cpu_end         = "red"
free_start      = "green"
free_mid        = "subtext"
free_end        = "blue"
cached_start    = "sapphire"
cached_mid      = "blue"
cached_end      = "red"
available_start = "green"
available_mid   = "red"
available_end   = "red"
used_start      = "teal"
used_mid        = "teal"
used_end        = "sky"
download_start  = "orange"
download_mid    = "red"
download_end    = "red"
upload_start    = "green"
upload_mid      = "teal"
upload_end      = "sky"
process_start   = "sapphire"
process_mid     = "subtext"
process_end     = "mauve"
error_status    = "red"
success_status  = "green"
replace_mode    = "teal"
visual_mode     = "overlay"
dir_fg          = "teal"
git_fg          = "mauve"
time_fg         = "yellow"


